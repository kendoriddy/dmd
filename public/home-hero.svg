<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="0.55" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#0F1A18"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0EA5A3" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#E6FFFB" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#0F766E" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(520 380) rotate(38) scale(820 520)">
      <stop stop-color="#0EA5A3" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0EA5A3" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Three vertical panels hinting: Energy / Infrastructure / Agriculture -->
  <g opacity="0.9">
    <rect x="140" y="190" width="520" height="700" rx="28" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.07"/>
    <rect x="700" y="150" width="520" height="780" rx="28" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.07"/>
    <rect x="1260" y="210" width="520" height="660" rx="28" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.07"/>
  </g>

  <!-- Energy: solar tiles -->
  <g transform="translate(220 300)" opacity="0.9">
    <rect x="0" y="0" width="360" height="180" rx="18" fill="#0EA5A3" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <g stroke="#0EA5A3" stroke-opacity="0.25">
      <path d="M40 20V160"/><path d="M92 20V160"/><path d="M144 20V160"/><path d="M196 20V160"/><path d="M248 20V160"/><path d="M300 20V160"/>
      <path d="M20 52H340"/><path d="M20 92H340"/><path d="M20 132H340"/>
    </g>
    <circle cx="320" cy="-10" r="46" fill="#0EA5A3" fill-opacity="0.10" filter="url(#soft)"/>
  </g>

  <!-- Infrastructure: skyline lines -->
  <g transform="translate(780 290)" opacity="0.85" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="3">
    <path d="M10 430V220H90V430"/><path d="M120 430V170H210V430"/><path d="M240 430V200H320V430"/>
    <path d="M350 430V150H460V430"/><path d="M490 430V210H600V430"/>
    <path d="M10 430H600" stroke-opacity="0.22"/>
  </g>

  <!-- Agriculture: field rows -->
  <g transform="translate(1320 340)" opacity="0.9" stroke="#0EA5A3" stroke-opacity="0.18" stroke-width="3" fill="none">
    <path d="M0 420Q140 300 320 300T520 260"/>
    <path d="M0 460Q140 340 320 340T520 300"/>
    <path d="M0 500Q140 380 320 380T520 340"/>
    <path d="M0 540Q140 420 320 420T520 380"/>
    <path d="M0 580Q140 460 320 460T520 420"/>
  </g>

  <!-- Silverline arc connecting panels -->
  <path d="M240 820Q760 140 980 520T1680 220" stroke="url(#teal)" stroke-width="10" stroke-linecap="round" opacity="0.65" filter="url(#soft)"/>
  <path d="M240 820Q760 140 980 520T1680 220" stroke="#0EA5A3" stroke-opacity="0.4" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="10 16"/>
</svg>

